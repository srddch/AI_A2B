<!DOCTYPE html>
<html>
<head>
    <title>TBRGS Route System</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }

        .box {
            padding: 20px;
            border: 1px solid #ccc;
            width: 400px;
        }

        input, select {
            width: 100%;
            margin: 5px 0;
            padding: 8px;
        }

        button {
            padding: 10px;
            width: 100%;
            background: black;
            color: white;
            border: none;
            margin-top: 10px;
        }

        .result {
            margin-top: 20px;
        }

        .path {
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }

        .best {
            font-weight: bold;
            color: green;
        }
    </style>
</head>

<body>

<h1>TBRGS Route System</h1>

<div class="box">
    <form method="POST">

        <input name="origin" placeholder="Origin (e.g. A)" required>
        <input name="destination" placeholder="Destination (e.g. D)" required>
        <input name="time" placeholder="Time (e.g. 08:00)" required>

        <!-- ⭐ 加分项：模型选择 -->
        <select name="model">
            <option value="lstm">LSTM</option>
            <option value="gru">GRU</option>
        </select>

        <button type="submit">Find Routes</button>
    </form>
</div>

{% if result and result.best_path %}
<div class="result">

    <h2>Best Path</h2>

    <div class="path best">
        {{ " → ".join(result.best_path.nodes) }}
        | Cost: {{ "%.2f"|format(result.best_path.cost) }}
    </div>

    <h2>All Paths</h2>

    {% for p in result.paths %}
        <div class="path {% if p.nodes == result.best_path.nodes %}best{% endif %}">
            {{ " → ".join(p.nodes) }}
            | Cost: {{ "%.2f"|format(p.cost) }}
        </div>
    {% endfor %}

</div>
{% endif %}

</body>
</html>
